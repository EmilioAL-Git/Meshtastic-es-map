server {
    listen 80;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # =404: un JSON o asset que falte debe dar 404, no devolver index.html
        try_files $uri $uri/ =404;
        expires 1m;
        add_header Cache-Control "public, max-age=60";

        # Cabeceras de seguridad
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    }

    # Datos JSON generados por el collector
    location /data/ {
        alias /data/json/;
        expires -1;
        add_header Cache-Control "no-store";
    }

    access_log /var/log/nginx/meshtastic-es-map_access.log;
    error_log  /var/log/nginx/meshtastic-es-map_error.log;
}
