##
## Nginx config para meshtastic-es-map
## Coloca en: /etc/nginx/sites-available/meshtastic-es-map
## Activa con: ln -s /etc/nginx/sites-available/meshtastic-es-map /etc/nginx/sites-enabled/
##
## Ajusta:
##   server_name  → tu dominio o IP
##   root         → ruta a la carpeta web/
##

server {
    listen 80;
    server_name tu-dominio.com;    # ← cambia esto

    # ── Mapa estático ─────────────────────────────────────────────────────────
    root /opt/meshtastic-es-map/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cabeceras de seguridad
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # Cache corto para el HTML (el JS actualiza los datos)
        expires 1m;
        add_header Cache-Control "public, max-age=60";
    }

    # ── Proxy a la API FastAPI ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS ya lo maneja FastAPI, pero por si acaso:
        add_header Access-Control-Allow-Origin "*";

        # Timeout razonable
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;

        # Sin cache para datos en tiempo real
        expires -1;
        add_header Cache-Control "no-store";
    }

    location /health {
        proxy_pass http://127.0.0.1:8090;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/meshtastic-es-map_access.log;
    error_log  /var/log/nginx/meshtastic-es-map_error.log;
}

