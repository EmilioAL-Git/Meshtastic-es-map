<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Red Meshtastic España</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css?v=1.1.0"/>
</head>

<body>
<script>
  if (new URLSearchParams(location.search).has('embed') || window.self !== window.top) {
    document.body.classList.add('embed-mode');
  }
</script>

<!-- Loading -->
<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">CARGANDO RED MESHTASTIC…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="3" fill="#00e5a0"/>
      <circle cx="6"  cy="6"  r="2" fill="#00e5a0" opacity=".6"/>
      <circle cx="22" cy="6"  r="2" fill="#00e5a0" opacity=".6"/>
      <circle cx="6"  cy="22" r="2" fill="#00e5a0" opacity=".4"/>
      <circle cx="22" cy="22" r="2" fill="#00e5a0" opacity=".4"/>
      <line x1="14" y1="14" x2="6"  y2="6"  stroke="#00e5a0" stroke-width="1" opacity=".5"/>
      <line x1="14" y1="14" x2="22" y2="6"  stroke="#00e5a0" stroke-width="1" opacity=".5"/>
      <line x1="14" y1="14" x2="6"  y2="22" stroke="#00e5a0" stroke-width="1" opacity=".3"/>
      <line x1="14" y1="14" x2="22" y2="22" stroke="#00e5a0" stroke-width="1" opacity=".3"/>
    </svg>
    <span>MESHTASTIC ESPAÑA <em>/ Mapa de nodos</em></span>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="hdr-nodes">—</div>
      <div class="stat-lbl">Nodos</div>
    </div>
    <div class="sep"></div>
    <div class="stat">
      <div class="stat-val" id="hdr-active">—</div>
      <div class="stat-lbl">Activos 1h</div>
    </div>
    <div class="sep"></div>
    <div class="stat">
      <div class="stat-val" id="hdr-gw">—</div>
      <div class="stat-lbl">Gateways</div>
    </div>
    <div class="sep"></div>
    <div class="stat">
      <div class="stat-val" id="hdr-edges">—</div>
      <div class="stat-lbl">Conexiones</div>
    </div>
    <div class="sep"></div>
    <span class="last-update" id="last-update">—</span>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar nodo…" autocomplete="off" oninput="onSearchInput()" onfocus="onSearchInput()" onkeydown="onSearchKey(event)" onblur="setTimeout(()=>setMapControlsVisible(true),200)">
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>

  </div>
</header>

<!-- Main -->
<div class="main">
  <div id="map">
    <!-- Botón filtros (móvil) — dentro del mapa para posicionarse bajo el header -->
    <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilterPanel()" title="Filtros">
      <svg viewBox="0 0 16 16" fill="none">
        <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- Filtros -->
<div class="filter-panel" id="filter-panel">
  <button class="fchip active" data-cat="gateway" onclick="toggleFilter('gateway')">
    <span class="fchip-dot" style="background:#fbbf24;box-shadow:0 0 5px #fbbf24"></span>Gateway
  </button>
  <button class="fchip active" data-cat="router" onclick="toggleFilter('router')">
    <span class="fchip-dot" style="background:#fb923c;box-shadow:0 0 5px #fb923c"></span>Router
  </button>
  <button class="fchip active" data-cat="recent" onclick="toggleFilter('recent')">
    <span class="fchip-dot" style="background:#5eead4;box-shadow:0 0 5px #5eead4"></span>Activo &lt;1h
  </button>
  <button class="fchip active" data-cat="active" onclick="toggleFilter('active')">
    <span class="fchip-dot" style="background:#7dd3fc"></span>Activo &lt;24h
  </button>
  <button class="fchip active" data-cat="old" onclick="toggleFilter('old')">
    <span class="fchip-dot" style="background:#64748b"></span>Sin actividad
  </button>
</div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="node-dot dot-recent" id="detail-dot"></div>
    <div class="detail-title" id="detail-title">—</div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Leyenda -->
<div class="legend">
  <div class="legend-title">Leyenda</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5eead4;box-shadow:0 0 5px #5eead4"></div> Activo &lt;1h</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc"></div> Activo &lt;24h</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;box-shadow:0 0 5px #fbbf24"></div> Gateway MQTT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fb923c;box-shadow:0 0 5px #fb923c"></div> Router / Repeater</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div> Sin actividad reciente</div>
  <hr class="legend-sep">
  <div class="legend-item">
    <svg class="legend-line" width="24" height="10" viewBox="0 0 24 10">
      <line x1="0" y1="5" x2="24" y2="5" stroke="#1d4ed8" stroke-width="2"/>
    </svg>
    Vecino directo
  </div>
  <div class="legend-item">
    <svg class="legend-line" width="24" height="10" viewBox="0 0 24 10">
      <line x1="0" y1="5" x2="24" y2="5" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 5"/>
    </svg>
    Traceroute
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<footer class="app-footer">
  <div class="footer-left">
    <span class="footer-source">Datos extraídos de: <a href="https://meshview.meshtastic.es" target="_blank" rel="noopener">meshview.meshtastic.es</a></span>
  </div>
  <div class="footer-right">
    <a class="footer-gh" href="https://github.com/EmilioAL-Git/Meshtastic-es-map" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38v-1.34c-2.23.48-2.7-1.07-2.7-1.07-.36-.92-.88-1.17-.88-1.17-.72-.5.05-.48.05-.48.8.06 1.22.82 1.22.82.71 1.22 1.87.87 2.32.66.07-.52.28-.87.5-1.07-1.77-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.66 7.66 0 018 3.8c.68 0 1.36.09 2 .26 1.52-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.19c0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <span class="footer-version">v1.2.1</span>
  </div>
</footer>

<script src="js/state.js?v=1.1.0"></script>
<script src="js/map.js?v=1.1.0"></script>
<script src="js/filters.js?v=1.1.0"></script>
<script src="js/search.js?v=1.1.0"></script>
<script src="js/ui.js?v=1.1.0"></script>
<script src="js/app.js?v=1.1.0"></script>
</body>
</html>
