services:

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    volumes:
      - db-data:/data
      - json-data:/data/json
    restart: unless-stopped
    env_file: .env
    environment:
      - JSON_OUT=/data/json
    healthcheck:
      test: ["CMD", "test", "-f", "/data/json/nodes.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8095}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - json-data:/data/json:ro
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      collector:
        condition: service_healthy

volumes:
  db-data:
  json-data:
