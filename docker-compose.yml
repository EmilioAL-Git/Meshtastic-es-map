services:

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    volumes:
      - db-data:/data
      - json-data:/data/json
    restart: unless-stopped
    env_file: .env
    environment:
      - JSON_OUT=/data/json
    healthcheck:
      test: ["CMD", "test", "-f", "/data/json/nodes.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  topnodos:
    build:
      context: .
      dockerfile: Dockerfile.collector
    command: ["python", "/app/entrypoint.py", "update-top.py", "--daemon"]
    volumes:
      - db-data:/data
      - json-data:/data/json
    restart: unless-stopped
    env_file: .env
    environment:
      - JSON_OUT=/data/json
      - CCAA_CACHE_PATH=/data/ccaa-cache.json

  web:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8095}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - json-data:/data/json:ro
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      collector:
        # service_started (no service_healthy): si meshview está caído al
        # arrancar, la web sirve los JSON viejos del volumen en vez de no levantar
        condition: service_started

volumes:
  db-data:
  json-data:
